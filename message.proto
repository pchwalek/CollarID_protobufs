syntax = "proto3";

import "common.proto";

//import "nanopb.proto";
//option (nanopb_fileopt).packed_struct = true;
//python generator/nanopb_generator.py ../buzzcam/protobuf/message.proto -I ../buzzcam/protobuf
//protoc message.proto --python_out=./ -I=./
/**************/




message SystemInfoPacket{
    optional SystemSensorSummary system_sensor_summary = 1;
    optional SDCardState sdcard_state = 2;
    optional BatteryState battery_state = 3;
    optional Metadata metadata = 4;
    optional GPSData gps_data = 5;
}

message Metadata{
	float gps_avg_fix_time = 1;
}

message ConfigPacket{
    bool engage_system = 1;
    bool enable_microphone = 2;
    bool enable_activity = 3;
    bool enable_particulate = 4;
    bool enable_environmental = 5;
    bool enable_light = 6;
    bool enable_motion = 7;
    bool enable_lora = 8;
}



message GPSData_2{
    int32 latitude_e7 = 1;
    int32 longitude_e7 = 2;
    optional uint32 altitude_mm = 3;
    uint32 timestamp = 4;
    optional uint32 gps_avg_fix_time_s = 5;
    optional uint32 hdop = 6;
    optional uint32 h_acc_dm = 7;
}





message SystemSensorSummary{
    float temperature = 1;
    float humidity = 2;
    float pressure = 3;
    float gas = 4;
    float pm1 = 5;
    float pm2_5 = 6;
    float pm10 = 7;
    uint32 light = 8;
    uint32 steps = 9;

    bool particulate_obstructed = 10;
    bool particulate_outside_detection_limits = 11;
}
				



message AckPacket{

}

message RadioInfo{
    int32 rssi = 1;
    int32 snr = 2;
    int32 rssi_est = 3;
}

message AccAxis{
    uint32 x = 1;
    uint32 y = 2;
    uint32 z = 3;
}

message AccStats{
    uint32 ODBA_mean_x100 = 1;
    uint32 ODBA_max_x100 = 2;
    uint32 VeDBA_mean_x100 = 3;
    uint32 VeDBA_max_x100 = 4;
    optional AccAxis StdDev_x100 = 5;
    optional AccAxis Mean_x100 = 6;
}

message EnvData{
    optional int32 temperature_x10 = 1;
    optional uint32 humidity_x10 = 2;
    optional uint32 gas = 3;
    optional uint32 pressure = 4;
    optional uint32 light = 5;
    optional uint32 timestamp = 6;
}

message ParticulateData{
    uint32 pm1 = 1;
    uint32 pm2_5 = 2;
    uint32 pm10 = 3;
    optional uint32 timestamp = 4;
}

// Bitmask carried on uplinks while a condition persists.
//   bits 0-6  boot hardware diagnostics, bit set = FAULT (hw_diag.h):
//             0 accel, 1 mag, 2 light, 3 BME688, 4 GPS, 5 particulate, 6 LoRa
//   bit  7    diagnostics ran (validity bit for 0-6)
//   bit  8    MORTALITY: VeDBA has stayed near zero past the configured
//             trigger duration. Not a hardware fault — consumers must mask
//             bits 0-7 before reporting hardware health, or a mortality
//             flag will read as a broken collar.
//   bits 9-31 free
message ErrorFlags{
    uint32 flag = 1;
}

message Deployment{
    optional ParticulateData particulateData = 1;

    optional EnvData envData = 2;

    optional uint32 space_remaining_mb = 3;

    uint32 battery_percentage_x10 = 4;

    optional AccStats accStats= 5;

    optional uint32 steps = 6;

    repeated GPSData_2 gps_data = 7;

    optional ErrorFlags errorFlags = 8;

    // Add-on (detachment/SatCom) relay — empty when the collar has no
    // paired add-on or nothing new to report. Repeated: one entry per
    // add-on in the Thread rendezvous seen-nodes report (up to 4; see
    // DESIGN_detachment_thread.md §7.1 multi-add-on policy).
    repeated AddonReport addon = 9;
}

message AddonReport {
    uint32 uid = 1;               // add-on die UID
    uint32 node_type = 2;         // AddonNodeType (addon.proto)
    uint32 last_checkin_epoch = 3;// UTC s of the last completed rendezvous
    optional uint32 batt_mv = 4;
    optional uint32 detach_epoch = 5;  // armed drop-off time, 0/absent = none
    optional uint32 fired = 6;         // 1 = scheduled detach already fired
    optional uint32 motor_state = 7;   // AddonMotorState
    // 7.1 durable command queue: the collar's queued command for this add-on,
    // so the dashboard renders pending/delivered/confirmed truthfully.
    optional uint32 pending_cmd = 8;   // DtCmd_t numbering; absent = none
    optional uint32 cmd_state = 9;     // 1 pending, 2 delivered, 3 confirmed
    // The queued command's parameter — for an arm (pending_cmd=1) this is the
    // target detach epoch, so the dashboard shows the datetime while the arm
    // is still in flight (before the node confirms it in detach_epoch).
    optional uint32 pending_cmd_param = 10;
}

message MessagePacket {
    PacketHeader header = 1;

    oneof payload {
        SystemInfoPacket system_info_packet = 2;
        ConfigPacket config_packet = 3;
        AckPacket ack_packet = 4;
	    Deployment system_deployment_packet = 5;
    }

    optional RadioInfo radio_info = 6;
}



